<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>CORE | MASTER SINGULARITY V100</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00f2ff; --s:#7000ff; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; height:100vh; }
canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

.nav-hud{ position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:2000; display:flex; gap:10px; background:rgba(0,0,0,0.8); padding:10px 20px; border:1px solid var(--p); border-radius:50px; backdrop-filter:blur(20px); }
.hud-btn{ background:transparent; border:none; color:#fff; font-family:'Orbitron'; font-size:9px; cursor:pointer; letter-spacing:2px; opacity:0.5; transition:0.3s; }
.hud-btn.active{ opacity:1; color:var(--p); text-shadow:0 0 10px var(--p); }

.page{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
.page.active{ display:flex; }

iframe{ width:100vw; height:100vh; border:none; display:none; }
iframe.active{ display:block; }

#nexus-title{ font-family:'Orbitron'; font-size:clamp(3rem, 15vw, 10rem); letter-spacing:30px; text-shadow: 0 0 30px var(--p); text-transform:uppercase; }
</style>
</head>
<body>
    <nav class='nav-hud'>
        <button class='hud-btn active' id='b1' onclick='sw(1)'>NEXUS</button>
        <button class='hud-btn' id='b2' onclick='sw(2)'>INTEL</button>
        <button class='hud-btn' id='b3' onclick='sw(3)'>ARCADE_1</button>
        <button class='hud-btn' id='b4' onclick='sw(4)'>ULTRA_DESIGN</button>
        <button class='hud-btn' id='b5' onclick='sw(5)'>VOYAGER_16D</button>
    </nav>

    <canvas id='bg'></canvas>

    <section class='page active' id='p1'><h1 id='nexus-title'>CORE</h1><p style='opacity:0.4; letter-spacing:10px;'>PEAK_V41_FROZEN</p></section>

    <section class='page' id='p2'>
        <div style='border:1px solid var(--p); padding:40px; background:rgba(0,242,255,0.02);'>
            <h2 style='font-family:Orbitron; letter-spacing:10px;'>NEURAL_REFRESHMENT</h2>
            <p style='font-family:JetBrains Mono; font-size:10px; opacity:0.6;'>UNIQUE_PHASE_SHIFT_V100</p>
        </div>
    </section>

    <iframe id='f3' srcdoc=''></iframe>
    <iframe id='f4' srcdoc=''></iframe>
    <iframe id='f5' srcdoc=''></iframe>

    <script>
    const AudioEngine = { 
        ctx: null, 
        trigger() { 
            if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
            o.type='sine'; o.frequency.setValueAtTime(440, this.ctx.currentTime);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime+0.5);
            o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+0.5);
        }
    };

    function sw(id) { 
        AudioEngine.trigger();
        document.querySelectorAll('.page, iframe').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
        const target = id < 3 ? document.getElementById('p'+id) : document.getElementById('f'+id);
        target.classList.add('active'); document.getElementById('b'+id).classList.add('active');
    }

    const canvas=document.getElementById('bg'), ctx=canvas.getContext('2d');
    let w,h,t=0,pts=[]; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;} res();
    for(let i=0;i<200;i++) pts.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*w});
    function draw(){ t+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
        pts.forEach(p=>{ p.z-=2; if(p.z<=0)p.z=w; let sc=400/p.z; ctx.fillStyle='rgba(0,242,255,0.5)'; ctx.fillRect((p.x-w/2)*sc+w/2,(p.y-h/2)*sc+h/2,sc,sc); });
        requestAnimationFrame(draw); 
    } draw();
    </script>
</body>
</html>
