<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>STORY | V100 IMMERSIVE PLATFORM</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=Syncopate:wght@700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#fff; --bg:#000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow-x:hidden; scroll-behavior:smooth; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.3; }

section{ height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:100px; box-sizing:border-box; border-bottom:1px solid rgba(255,255,255,0.05); position:relative; z-index:10; }

.story-hero{ font-family:'Syncopate'; font-weight:700; font-size:clamp(2rem, 10vw, 8rem); letter-spacing:30px; text-transform:uppercase; text-align:center; opacity:0.9; }
.reveal-block{ width:1px; height:0%; background:#fff; transition:2s cubic-bezier(0.19, 1, 0.22, 1); margin:40px 0; }
.active .reveal-block{ height:200px; }

.image-block{ width:90%; max-width:1400px; height:70vh; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.02); display:flex; align-items:center; justify-content:center; margin-top:50px; overflow:hidden; position:relative; }
.image-block::after{ content:''; position:absolute; inset:0; background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)); }

.hud-status{ position:fixed; bottom:40px; left:40px; z-index:1000; font-family:Orbitron; font-size:9px; letter-spacing:5px; opacity:0.4; border-bottom:1px solid #fff; padding-bottom:10px; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='hud-status'>NODE_08: IMMERSIVE_STORYTELLING_SYSTEM</div>
<div class='flagship-container'>
    <section class='active'>
        <h1 class='story-hero'>VISIBLE<br>HISTORY</h1>
        <div class='reveal-block'></div>
        <p style='font-size:12px; letter-spacing:10px; opacity:0.5;'>[ ARCHIVING_NEURAL_LEGACY ]</p>
    </section>
    <section>
        <div class='image-block'>
            <h2 style='font-family:Orbitron; letter-spacing:20px; opacity:0.1; font-size:6rem;'>CHRONICLE</h2>
        </div>
        <p style='max-width:800px; text-align:center; line-height:2.5; margin-top:40px; opacity:0.6;'>A high-fidelity platform for deep image-led storytelling. Every section utilizes breathing light transitions to guide the observer through the network's evolution.</p>
    </section>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w,h,t=0; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;
for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(w/2,h/2,100+i*50+Math.sin(t+i)*20,0,Math.PI*2);ctx.stroke();}requestAnimationFrame(draw);}draw();
window.addEventListener('scroll', () => {
    document.querySelectorAll('section').forEach(s => {
        const rect = s.getBoundingClientRect();
        if(rect.top < window.innerHeight/2 && rect.bottom > window.innerHeight/2) s.classList.add('active');
    });
});
</script></body></html>
