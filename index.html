<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>CORE | ULTIMATE SINGULARITY</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00f2ff; --s:#7000ff; --bg:#000; --layer:1; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; height:100vh; }
canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

/* NAVIGATION HUD */
.nav-hud{ position:fixed; top:30px; left:50%; transform:translateX(-50%); z-index:2000; display:flex; gap:20px; background:rgba(255,255,255,0.05); padding:10px 30px; border:1px solid rgba(0,242,255,0.2); backdrop-filter:blur(20px); border-radius:50px; }
.hud-btn{ background:transparent; border:none; color:#fff; font-family:'Orbitron'; font-size:10px; cursor:pointer; letter-spacing:3px; opacity:0.5; transition:0.4s; }
.hud-btn.active{ opacity:1; color:var(--p); text-shadow:0 0 10px var(--p); }

/* PAGE SECTIONS */
.page{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
.page.active{ display:flex; }

/* LAYER 1: NEXUS */
#nexus-title{ font-family:'Orbitron'; font-size:clamp(3rem, 15vw, 10rem); letter-spacing:30px; text-shadow: 0 0 30px var(--p); text-transform:uppercase; }

/* LAYER 3: ARCADE */
iframe{ width:100vw; height:100vh; border:none; display:none; }
iframe.active{ display:block; }
</style>
</head>
<body>
    <nav class='nav-hud'>
        <button class='hud-btn active' id='btn1' onclick='switchLayer(1)'>NEXUS</button>
        <button class='hud-btn' id='btn2' onclick='switchLayer(2)'>INTELLIGENCE</button>
        <button class='hud-btn' id='btn3' onclick='switchLayer(3)'>ARCADE</button>
    </nav>

    <canvas id='universe-bg'></canvas>

    <!-- LAYER 1: BEST VERSION (V41 NEXUS) -->
    <section class='page active' id='layer1'>
        <h1 id='nexus-title'>CORE</h1>
        <p style='font-family:JetBrains Mono; opacity:0.4; letter-spacing:10px;'>PEAK_STABILITY_V41</p>
    </section>

    <!-- LAYER 2: RE-ENGINEERED VERSION (V40 GAMING) -->
    <section class='page' id='layer2'>
        <div style='border-left:2px solid var(--p); padding-left:30px;'>
            <h2 style='font-family:Orbitron; letter-spacing:10px;'>NEURAL_DEFENSE</h2>
            <p style='opacity:0.6; font-size:12px;'>SYSTEM_INTEGRITY: 100%</p>
            <button class='hud-btn' style='opacity:1; border:1px solid var(--p); padding:10px;' onclick='switchLayer(3)'>ENTER_SIMULATION</button>
        </div>
    </section>

    <!-- LAYER 3: ARCADE HUB (RE-INTEGRATED GAMES) -->
    <section class='page' id='layer3'>
        <iframe id='game-frame' src=''></iframe>
    </section>

    <script>
    const canvas=document.getElementById('universe-bg'), ctx=canvas.getContext('2d');
    let w,h,t=0,particles=[];
    function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;} res();
    for(let i=0;i<350;i++) particles.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, c:Math.random()*360});

    function switchLayer(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('layer'+id).classList.add('active');
        document.getElementById('btn'+id).classList.add('active');
        if(id === 3) {
            document.getElementById('game-frame').classList.add('active');
            document.getElementById('game-frame').srcdoc = "<html><body style='background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Orbitron;'><h1>ARCADE_INITIALIZING...</h1></body></html>";
        }
    }

    function draw(){
        t+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
        particles.forEach(p => {
            p.z -= 5; if(p.z<=0) p.z=w;
            let sc=400/p.z; let x=(p.x-w/2)*sc+w/2; let y=(p.y-h/2)*sc+h/2;
            ctx.fillStyle=`hsla(${p.c},100%,70%,${1-p.z/w})`;
            ctx.beginPath(); ctx.arc(x,y,sc*1.5,0,Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(draw);
    } draw();
    </script>
</body>
</html>
