<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>CORE | ULTIMATE STABILIZATION</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00f2ff; --s:#7000ff; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; height:100vh; }
canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }
.hud-layer{ position:fixed; top:30px; left:50%; transform:translateX(-50%); z-index:1000; display:flex; gap:20px; background:rgba(0,0,0,0.8); padding:10px 30px; border:1px solid var(--p); border-radius:50px; backdrop-filter:blur(20px); }
.hud-btn{ background:transparent; border:none; color:#fff; font-family:'Orbitron'; font-size:10px; cursor:pointer; letter-spacing:3px; opacity:0.5; transition:0.3s; }
.hud-btn.active{ opacity:1; color:var(--p); text-shadow:0 0 10px var(--p); }
.page{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
.page.active{ display:flex; }
#nexus-title{ font-family:'Orbitron'; font-size:clamp(3rem, 15vw, 10rem); letter-spacing:30px; text-shadow: 0 0 30px var(--p); text-transform:uppercase; }
</style>
</head>
<body>
    <nav class='hud-layer'>
        <button class='hud-btn active' onclick='sw(1)'>NEXUS</button>
        <button class='hud-btn' onclick='sw(2)'>STABILITY</button>
    </nav>
    <canvas id='c'></canvas>
    <section class='page active' id='p1'><h1 id='nexus-title'>CORE</h1><p style='letter-spacing:10px; opacity:0.4;'>NEURAL_SINGULARITY_STABLE</p></section>
    <section class='page' id='p2'><div style='border-left:2px solid var(--p); padding-left:30px;'><h2 style='font-family:Orbitron; letter-spacing:5px;'>SYSTEM_INTEGRITY: 100%</h2><p style='opacity:0.6; font-size:12px;'>ALL LAYERS SYNCHRONIZED AND RECOVERED</p></div></section>
    <script>
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let w,h,t=0,pts=[]; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;} res();
    for(let i=0;i<300;i++) pts.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, c:Math.random()*360});
    function sw(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('p'+id).classList.add('active'); }
    function draw(){ t+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
        pts.forEach(p=>{ p.z-=5; if(p.z<=0) p.z=w; let sc=400/p.z; ctx.fillStyle=`hsla(${p.c},100%,70%,${1-p.z/w})`; ctx.beginPath(); ctx.arc((p.x-w/2)*sc+w/2,(p.y-h/2)*sc+h/2,sc,0,Math.PI*2); ctx.fill(); });
        requestAnimationFrame(draw);
    } draw();
    </script>
</body>
</html>
