    <iframe id='g1' class='active' srcdoc='<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEXUS SPACE RACER — Hyperdrive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;overflow:hidden;font-family:\'Courier New\',monospace;width:100vw;height:100vh;touch-action:none}
canvas{display:block;position:fixed;inset:0}
#gameCanvas{z-index:1}
#uiCanvas{z-index:2;pointer-events:none}

#hud{position:fixed;inset:0;z-index:10;pointer-events:none}
.hud-tl{position:absolute;top:16px;left:16px}
.hud-tr{position:absolute;top:16px;right:16px;text-align:right}
.hud-bc{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:20px}

.hval{font-size:clamp(1.2rem,4vw,2.2rem);font-weight:900;color:#00f5ff;letter-spacing:0.08em;line-height:1;text-shadow:0 0 20px #00f5ff,0 0 40px rgba(0,245,255,0.4)}
.hlabel{font-size:clamp(0.45rem,1.2vw,0.6rem);letter-spacing:0.3em;color:rgba(0,245,255,0.35);text-transform:uppercase;margin-top:2px}

.speed-bar{width:clamp(120px,20vw,200px);height:6px;background:rgba(0,245,255,0.1);border-radius:3px;margin-top:6px;overflow:hidden}
.speed-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00ff88,#00f5ff,#bf00ff);transition:width 0.1s}

#overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);transition:opacity 0.5s}
#overlay h1{font-size:clamp(2rem,8vw,5rem);font-weight:900;letter-spacing:0.1em;background:linear-gradient(90deg,#00f5ff,#bf00ff,#ff0090,#00ff88,#00f5ff);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 3s linear infinite;text-align:center;line-height:1.1;margin-bottom:0.5rem}
@keyframes gs{to{background-position:300% 0}}
#overlay p{font-size:clamp(0.6rem,2vw,0.9rem);color:rgba(0,245,255,0.4);letter-spacing:0.3em;text-align:center;margin-bottom:2.5rem;text-transform:uppercase}
.play-btn{padding:clamp(12px,3vw,18px) clamp(28px,6vw,56px);background:transparent;border:2px solid #00ff88;color:#00ff88;font-family:\'Courier New\',monospace;font-size:clamp(0.7rem,2vw,1rem);letter-spacing:0.3em;cursor:pointer;border-radius:8px;transition:all 0.3s;text-transform:uppercase;position:relative;overflow:hidden}
.play-btn::before{content:\'\';position:absolute;inset:0;background:#00ff88;transform:scaleX(0);transform-origin:left;transition:transform 0.3s;z-index:-1}
.play-btn:hover,.play-btn:active{color:#000}.play-btn:hover::before,.play-btn:active::before{transform:scaleX(1)}

/* TOUCH CONTROLS */
#touchControls{position:fixed;bottom:20px;left:0;right:0;z-index:20;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none}
.tzone{width:clamp(80px,18vw,130px);height:clamp(80px,18vw,130px);border:1px solid rgba(0,245,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(1.5rem,4vw,2.5rem);color:rgba(0,245,255,0.4);pointer-events:all;user-select:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);transition:all 0.15s;-webkit-user-select:none}
.tzone:active,.tzone.pressed{background:rgba(0,245,255,0.15);border-color:#00f5ff;color:#00f5ff;transform:scale(0.95)}

#gameOver{display:none;text-align:center}
#gameOver h2{font-size:clamp(1.5rem,6vw,3.5rem);font-weight:900;color:#ff0090;letter-spacing:0.1em;text-shadow:0 0 30px #ff0090;margin-bottom:1rem}
#finalScore{font-size:clamp(1rem,4vw,2rem);color:#00f5ff;letter-spacing:0.2em;margin-bottom:2rem}
</style>

<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-tl">
    <div class="hval" id="hSpeed">0</div>
    <div class="hlabel">KM/H</div>

      <div class="hval" id="hLap" style="font-size:clamp(0.8rem,2.5vw,1.2rem);color:#ffd700;text-shadow:0 0 15px #ffd700">LAP 1</div>
      <div class="hlabel">CIRCUIT</div>
    </div>
  </div>
</div>

<!-- TOUCH CONTROLS -->
<div id="touchControls">
  <div class="tzone" id="btnLeft" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</div>
  <div style="display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:all">
    <div class="tzone" id="btnBoost" ontouchstart="keys.boost=true" ontouchend="keys.boost=false" style="width:clamp(60px,14vw,100px);height:clamp(60px,14vw,100px);border-color:rgba(255,215,0,0.3);color:rgba(255,215,0,0.5)">⚡</div>
  </div>
  <div class="tzone" id="btnRight" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="startScreen">
    <h1>NEXUS<br>SPACE RACER</h1>
    <p>hyperdrive · infinite circuit · deep space</p>
    <button class="play-btn" onclick="startGame()">▶ LAUNCH INTO SPACE</button>
  </div>
  <div id="gameOver">
    <h2>SHIP DESTROYED</h2>
    <div id="finalScore"></div>
    <button class="play-btn" onclick="startGame()" style="border-color:#ff0090;color:#ff0090">↺ RESPAWN</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════
const cv = document.getElementById(\'gameCanvas\');
const cx = cv.getContext(\'2d\');
let W, H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
resize(); window.addEventListener(\'resize\',resize);

// ═══════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════
let actx=null,engineGain=null,boostGain=null,bgGain=null;
let engineOsc=null,engineOsc2=null,boostOsc=null;

function initAudio(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  engineGain=actx.createGain();engineGain.gain.value=0;
  boostGain=actx.createGain();boostGain.gain.value=0;
  bgGain=actx.createGain();bgGain.gain.value=0.15;
  engineGain.connect(actx.destination);
  boostGain.connect(actx.destination);
  bgGain.connect(actx.destination);

  // Engine hum
  engineOsc=actx.createOscillator();engineOsc.type=\'sawtooth\';engineOsc.frequency.value=80;
  engineOsc.connect(engineGain);engineOsc.start();
  engineOsc2=actx.createOscillator();engineOsc2.type=\'sine\';engineOsc2.frequency.value=160;
  engineOsc2.connect(engineGain);engineOsc2.start();

  // Boost whine
  boostOsc=actx.createOscillator();boostOsc.type=\'sawtooth\';boostOsc.frequency.value=400;
  boostOsc.connect(boostGain);boostOsc.start();

  // Background deep space drone
  const bgOsc=actx.createOscillator();bgOsc.type=\'sine\';bgOsc.frequency.value=40;
  bgOsc.connect(bgGain);bgOsc.start();
  const bgOsc2=actx.createOscillator();bgOsc2.type=\'triangle\';bgOsc2.frequency.value=60;
  bgOsc2.connect(bgGain);bgOsc2.start();

  scheduleSuspenseBeats();
}

function scheduleSuspenseBeats(){
  if(!actx)return;
  const freqs=[220,277,330,415,220,185,165];
  let t=actx.currentTime+0.5;
  function schedNext(i){
    const g=actx.createGain();g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.06,t+0.05);
    g.gain.linearRampToValueAtTime(0,t+0.4);
    g.connect(actx.destination);
    const o=actx.createOscillator();o.type=\'triangle\';
    o.frequency.value=freqs[i%freqs.length];
    o.connect(g);o.start(t);o.stop(t+0.45);
    t+=0.35+Math.random()*0.2;
    setTimeout(()=>schedNext(i+1),300);
  }
  schedNext(0);
}

function updateEngineSound(speed,boost){
  if(!actx||!engineOsc)return;
  const freq=80+speed*1.8;
  engineOsc.frequency.linearRampToValueAtTime(freq,actx.currentTime+0.05);
  engineOsc2.frequency.linearRampToValueAtTime(freq*2,actx.currentTime+0.05);
  engineGain.gain.linearRampToValueAtTime(Math.min(0.15,speed/800),actx.currentTime+0.05);
  const boostFreq=400+speed*2;
  boostOsc&&boostOsc.frequency.linearRampToValueAtTime(boostFreq,actx.currentTime+0.05);
  boostGain.gain.linearRampToValueAtTime(boost?0.12:0,actx.currentTime+0.05);
}

function playExplosion(){
  if(!actx)return;
  const buf=actx.createBuffer(1,actx.sampleRate*1.5,actx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/actx.sampleRate*3);
  const src=actx.createBufferSource();src.buffer=buf;
  const g=actx.createGain();g.gain.value=0.6;
  const f=actx.createBiquadFilter();f.type=\'lowpass\';f.frequency.value=400;
  src.connect(f);f.connect(g);g.connect(actx.destination);
  src.start();
}

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
let gameRunning=false,score=0,lap=1,lives=3;
const keys={left:false,right:false,boost:false};

// Player ship
const ship={
  x:0,y:0,w:28,h:48,
  vx:0,vy:0,speed:0,
  maxSpeed:420,angle:0,
  boost:false,trail:[],
  invincible:0,engine:[],
  shield:100
};

// Road / tunnel
let roadOffset=0,roadSpeed=0;
let obstacles=[];
let stars=[];
let nebulae=[];
let particles2=[];
let powerups=[];

// Tunnel parameters
const ROAD_W=()=>W*0.55;
const ROAD_X=()=>(W-ROAD_W())/2;
let tunnelPulse=0;

function initStars(){
  stars=Array.from({length:300},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*2+0.3,
    speed:Math.random()*3+1,
    c:[\'#ffffff\',\'#aaddff\',\'#ffddaa\',\'#aaffdd\',\'#ffaadd\'][Math.floor(Math.random()*5)],
    a:Math.random()
  }));
  nebulae=Array.from({length:6},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:80+Math.random()*120,
    c:[\'rgba(0,245,255,0.04)\',\'rgba(191,0,255,0.04)\',\'rgba(255,0,144,0.04)\',\'rgba(0,255,136,0.03)\'][Math.floor(Math.random()*4)],
    speed:Math.random()*0.3+0.1
  }));
}

function spawnObstacle(){
  const rx=ROAD_X(),rw=ROAD_W();
  const types=[\'asteroid\',\'mine\',\'barrier\',\'crystal\'];
  const type=types[Math.floor(Math.random()*types.length)];
  const sizes={asteroid:28+Math.random()*20,mine:20,barrier:rw*0.35,crystal:18};
  const w=sizes[type];
  obstacles.push({
    x:type===\'barrier\'?rx+rw/2-w/2:rx+Math.random()*(rw-w),
    y:-60,w,h:type===\'barrier\'?18:w,
    speed:roadSpeed+1,type,
    rot:0,rotSpeed:(Math.random()-0.5)*0.1,
    pulse:Math.random()*Math.PI*2,
    hue:Math.floor(Math.random()*360)
  });
}

function spawnPowerup(){
  const rx=ROAD_X(),rw=ROAD_W();
  const types=[\'boost\',\'shield\',\'score\'];
  const type=types[Math.floor(Math.random()*types.length)];
  powerups.push({
    x:rx+20+Math.random()*(rw-40),y:-40,
    w:24,speed:roadSpeed+0.5,type,
    pulse:0,rot:0
  });
}

function spawnParticle(x,y,c,n=8){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1+Math.random()*4;
    particles2.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,c,r:1+Math.random()*3});
  }
}

function startGame(){
  if(!actx)initAudio();
  gameRunning=true;score=0;lap=1;lives=3;roadSpeed=3;
  ship.x=W/2;ship.y=H*0.78;ship.vx=0;ship.vy=0;ship.speed=0;
  ship.trail=[];ship.invincible=0;ship.shield=100;
  obstacles=[];powerups=[];particles2=[];
  initStars();
  document.getElementById(\'overlay\').style.opacity=\'0\';
  setTimeout(()=>{document.getElementById(\'overlay\').style.display=\'none\'},500);
  requestAnimationFrame(gameLoop);
}

function gameOver(){
  gameRunning=false;
  playExplosion();
  spawnParticle(ship.x,ship.y,\'#ff6600\',40);
  document.getElementById(\'overlay\').style.display=\'flex\';
  document.getElementById(\'startScreen\').style.display=\'none\';
  document.getElementById(\'gameOver\').style.display=\'block\';
  document.getElementById(\'finalScore\').textContent=\'SCORE: \'+score.toLocaleString();
  setTimeout(()=>{document.getElementById(\'overlay\').style.opacity=\'1\'},50);
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
window.addEventListener(\'keydown\',e=>{
  if(e.key===\'ArrowLeft\'||e.key===\'a\')keys.left=true;
  if(e.key===\'ArrowRight\'||e.key===\'d\')keys.right=true;
  if(e.key===\' \'||e.key===\'Shift\')keys.boost=true;
  e.preventDefault();
});
window.addEventListener(\'keyup\',e=>{
  if(e.key===\'ArrowLeft\'||e.key===\'a\')keys.left=false;
  if(e.key===\'ArrowRight\'||e.key===\'d\')keys.right=false;
  if(e.key===\' \'||e.key===\'Shift\')keys.boost=false;
});

// ═══════════════════════════════════════
// DRAW FUNCTIONS
// ═══════════════════════════════════════
function drawStars(dt){
  stars.forEach(s=>{
    s.y+=s.speed*(1+ship.speed/100)*dt*60;
    s.a+=0.01;
    if(s.y>H){s.y=-5;s.x=Math.random()*W}
    const al=0.4+0.6*Math.abs(Math.sin(s.a));
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=s.c;cx.globalAlpha=al;cx.fill();
    // Streak at high speed
    if(ship.speed>200){
      const len=ship.speed*0.04*s.speed;
      cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x,s.y-len);
      cx.strokeStyle=s.c;cx.globalAlpha=al*0.4;cx.lineWidth=s.r*0.5;cx.stroke();
    }
  });
  nebulae.forEach(n=>{
    n.y+=n.speed*(1+ship.speed/200)*dt*60;
    if(n.y>H+n.r){n.y=-n.r;n.x=Math.random()*W}
    cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);
    cx.fillStyle=n.c;cx.globalAlpha=1;cx.fill();
  });
  cx.globalAlpha=1;
}

function drawTunnel(dt){
  tunnelPulse+=dt*2;
  roadOffset=(roadOffset+roadSpeed*dt*60)%80;
  const rx=ROAD_X(),rw=ROAD_W();

  // Outer space fog
  const fog=cx.createLinearGradient(0,0,0,H);
  fog.addColorStop(0,\'rgba(0,0,20,0)\');
  fog.addColorStop(0.5,\'rgba(0,0,10,0.3)\');
  fog.addColorStop(1,\'rgba(0,0,0,0)\');
  cx.fillStyle=fog;cx.fillRect(0,0,W,H);

  // Road surface gradient
  const roadGrad=cx.createLinearGradient(rx,0,rx+rw,0);
  roadGrad.addColorStop(0,\'rgba(0,10,30,0.95)\');
  roadGrad.addColorStop(0.15,\'rgba(0,20,50,0.98)\');
  roadGrad.addColorStop(0.85,\'rgba(0,20,50,0.98)\');
  roadGrad.addColorStop(1,\'rgba(0,10,30,0.95)\');
  cx.fillStyle=roadGrad;cx.fillRect(rx,0,rw,H);

  // Edge glow lines
  const edgePulse=0.6+0.4*Math.sin(tunnelPulse);
  cx.shadowBlur=20;cx.shadowColor=\'#00f5ff\';
  cx.strokeStyle=`rgba(0,245,255,${edgePulse*0.8})`;cx.lineWidth=2;
  cx.beginPath();cx.moveTo(rx,0);cx.lineTo(rx,H);cx.stroke();
  cx.beginPath();cx.moveTo(rx+rw,0);cx.lineTo(rx+rw,H);cx.stroke();
  cx.shadowBlur=0;

  // Inner edge lines
  cx.strokeStyle=`rgba(0,245,255,${edgePulse*0.3})`;cx.lineWidth=0.5;
  cx.beginPath();cx.moveTo(rx+12,0);cx.lineTo(rx+12,H);cx.stroke();
  cx.beginPath();cx.moveTo(rx+rw-12,0);cx.lineTo(rx+rw-12,H);cx.stroke();

  // Road lane lines
  const laneCount=3;
  for(let l=1;l<laneCount;l++){
    const lx=rx+rw*(l/laneCount);
    cx.strokeStyle=\'rgba(0,245,255,0.08)\';cx.lineWidth=1;cx.setLineDash([40,40]);cx.lineDashOffset=-roadOffset;
    cx.beginPath();cx.moveTo(lx,0);cx.lineTo(lx,H);cx.stroke();
  }
  cx.setLineDash([]);

  // Speed lines on edges
  if(ship.speed>150){
    for(let i=0;i<8;i++){
      const y=(i*H/8+roadOffset*4)%H;
      const alpha=(ship.speed-150)/270*0.3;
      cx.strokeStyle=`rgba(0,245,255,${alpha})`;cx.lineWidth=0.5;
      cx.beginPath();cx.moveTo(rx-20,y);cx.lineTo(rx+10,y);cx.stroke();
      cx.beginPath();cx.moveTo(rx+rw-10,y);cx.lineTo(rx+rw+20,y);cx.stroke();
    }
  }
}

function drawObstacles(dt){
  obstacles.forEach((o,i)=>{
    o.y+=o.speed*dt*60;
    o.rot+=o.rotSpeed*dt*60;
    o.pulse+=dt*3;

    cx.save();cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.rot);

    if(o.type===\'asteroid\'){
      const grd=cx.createRadialGradient(0,0,2,0,0,o.w/2);
      grd.addColorStop(0,`hsl(${o.hue},80%,60%)`);
      grd.addColorStop(0.5,`hsl(${o.hue+30},60%,30%)`);
      grd.addColorStop(1,`hsl(${o.hue},40%,10%)`);
      cx.fillStyle=grd;
      cx.beginPath();
      for(let j=0;j<8;j++){const a=j/8*Math.PI*2;const r=o.w/2*(0.7+0.3*Math.sin(j*3.7));cx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
      cx.closePath();cx.fill();
      cx.shadowBlur=15;cx.shadowColor=`hsl(${o.hue},100%,60%)`;
      cx.strokeStyle=`hsl(${o.hue},100%,70%)`;cx.lineWidth=1.5;cx.stroke();
    } else if(o.type===\'mine\'){
      const p=0.5+0.5*Math.sin(o.pulse);
      cx.shadowBlur=20*p;cx.shadowColor=\'#ff0090\';
      cx.fillStyle=`rgba(255,0,144,${0.6+0.4*p})`;
      cx.beginPath();cx.arc(0,0,o.w/2,0,Math.PI*2);cx.fill();
      cx.strokeStyle=\'#ff0090\';cx.lineWidth=2;cx.stroke();
      // Spikes
      for(let j=0;j<8;j++){const a=j/8*Math.PI*2;cx.beginPath();cx.moveTo(Math.cos(a)*o.w/2,Math.sin(a)*o.w/2);cx.lineTo(Math.cos(a)*(o.w/2+8),Math.sin(a)*(o.w/2+8));cx.stroke()}
    } else if(o.type===\'barrier\'){
      const grad=cx.createLinearGradient(-o.w/2,0,o.w/2,0);
      grad.addColorStop(0,\'rgba(255,100,0,0)\');grad.addColorStop(0.5,\'rgba(255,100,0,0.9)\');grad.addColorStop(1,\'rgba(255,100,0,0)\');
      cx.fillStyle=grad;cx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
      cx.strokeStyle=`rgba(255,150,0,${0.7+0.3*Math.sin(o.pulse*2)})`;cx.lineWidth=2;
      cx.strokeRect(-o.w/2,-o.h/2,o.w,o.h);
    } else if(o.type===\'crystal\'){
      cx.shadowBlur=20;cx.shadowColor=\'#bf00ff\';
      cx.fillStyle=`rgba(191,0,255,${0.5+0.5*Math.sin(o.pulse)})`;

function updateShip2(dt){
  const turnSpeed=2.5;
  if(keys2.left)ship2.angle-=turnSpeed*dt;
  if(keys2.right)ship2.angle+=turnSpeed*dt;

  const thrust=ship2.boosting?800:450;
  if(keys2.up||keys2.boosting){
    ship2.vx+=Math.cos(ship2.angle)*thrust*dt;
    ship2.vy+=Math.sin(ship2.angle)*thrust*dt;
    fuel=Math.max(0,fuel-(ship2.boosting?0.8:0.3)*dt*60);
  }
  if(keys2.down){ship2.vx-=Math.cos(ship2.angle)*180*dt;ship2.vy-=Math.sin(ship2.angle)*180*dt}

  const maxSpd=ship2.boosting?ship2.maxSpeed:ship2.maxSpeed*0.6;
  const spd=Math.sqrt(ship2.vx*ship2.vx+ship2.vy*ship2.vy);
  if(spd>maxSpd){ship2.vx=ship2.vx/spd*maxSpd;ship2.vy=ship2.vy/spd*maxSpd}
  ship2.vx*=0.96;ship2.vy*=0.96;
  ship2.x+=ship2.vx*dt;ship2.y+=ship2.vy*dt;
  ship2.speed=Math.round(spd);

  // Wrap world
  ship2.x=((ship2.x%WORLD)+WORLD)%WORLD;
  ship2.y=((ship2.y%WORLD)+WORLD)%WORLD;

  // Heat
  heat=Math.min(100,heat+(ship2.boosting?0.8:0.1)*dt*60);
  heat=Math.max(0,heat-0.15*dt*60);
  if(heat>=100){ship2.shield-=5*dt;if(ship2.shield<=0)gameOver2()}

  // Fuel refill slowly
  fuel=Math.min(100,fuel+0.05*dt*60);
  ship2.boosting=keys2.boost&&fuel>0;

  camera.x+=(ship2.x-W/2-camera.x)*0.08;
  camera.y+=(ship2.y-H/2-camera.y)*0.08;
}

function updateEnemies(dt){
  enemies.forEach(e=>{
    const dx=ship2.x-e.x,dy=ship2.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    e.angle=Math.atan2(dy,dx);
    const spd=e.type===\'heavy\'?120:200;
    e.vx+=Math.cos(e.angle)*spd*dt*0.3;e.vy+=Math.sin(e.angle)*spd*dt*0.3;
    e.vx*=0.95;e.vy*=0.95;e.x+=e.vx*dt;e.y+=e.vy*dt;
    // Fire
    e.fireTimer-=dt;
    if(e.fireTimer<=0&&dist<600){
      e.fireTimer=e.type===\'heavy\'?2:1.2;
      const spd2=e.type===\'heavy\'?200:300;
      enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(e.angle)*spd2,vy:Math.sin(e.angle)*spd2,angle:e.angle,life:3});
    }
  });
}

function updateBullets(dt){
  ship2.fireTimer-=dt;
  if((keys2.fire)&&ship2.fireTimer<=0){
    ship2.fireTimer=0.15;
    const spd=650;
    bullets.push({x:ship2.x,y:ship2.y,vx:Math.cos(ship2.angle)*spd,vy:Math.sin(ship2.angle)*spd,angle:ship2.angle,life:1.5});
    playLaserSound();
  }
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt});
  enemyBullets=enemyBullets.filter(b=>b.life>0);
  enemyBullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt});
}

function updateAsteroids(dt){
  asteroids.forEach(a=>{a.x+=a.vx*dt*60;a.y+=a.vy*dt*60;a.rot+=a.rotSpeed*dt*60;a.x=((a.x%WORLD)+WORLD)%WORLD;a.y=((a.y%WORLD)+WORLD)%WORLD});
}

function checkCollisions2(){
  // Bullets vs asteroids
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ai=asteroids.length-1;ai>=0;ai--){
      const a=asteroids[ai];
      const dx=b.x-a.x,dy=b.y-a.y;
      if(Math.sqrt(dx*dx+dy*dy)<a.size){
        bullets.splice(bi,1);
        a.hp--;score2+=10;
        if(a.hp<=0){
          spawnExplosion(a.x,a.y,a.size>40);
          playExplosion2(a.size>40);
          score2+=a.size>40?200:50;
          if(a.size>35){spawnAsteroid(a.x,a.y,a.size*0.55,(Math.random()-0.5)*1.5,(Math.random()-0.5)*1.5);spawnAsteroid(a.x,a.y,a.size*0.55,(Math.random()-0.5)*1.5,(Math.random()-0.5)*1.5)}
          asteroids.splice(ai,1);
          if(asteroids.length<40)spawnAsteroid(Math.random()*WORLD,Math.random()*WORLD,30+Math.random()*50);
        }
        break;
      }
    }
  }

  // Bullets vs enemies
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<e.size*1.5){
        bullets.splice(bi,1);e.hp--;score2+=30;
        if(e.hp<=0){spawnExplosion(e.x,e.y,true);playExplosion2(true);enemies.splice(ei,1);score2+=300;spawnEnemy()}
        break;
      }
    }
  }

  // Enemy bullets vs ship
  for(let bi=enemyBullets.length-1;bi>=0;bi--){
    const b=enemyBullets[bi];
    if(Math.sqrt((b.x-ship2.x)**2+(b.y-ship2.y)**2)<ship2.w){
      enemyBullets.splice(bi,1);ship2.shield-=15;
      if(ship2.shield<=0)gameOver2();
    }
  }

  // Ship vs asteroids
  asteroids.forEach(a=>{
    const dx=ship2.x-a.x,dy=ship2.y-a.y;
    if(Math.sqrt(dx*dx+dy*dy)<a.size+ship2.w*0.4){
      ship2.shield-=2;spawnExplosion(ship2.x,ship2.y,false);
      ship2.vx+=dx/Math.sqrt(dx*dx+dy*dy)*3;ship2.vy+=dy/Math.sqrt(dx*dx+dy*dy)*3;
      if(ship2.shield<=0)gameOver2();
    }
  });

  // Ship vs rings
  rings.forEach(r=>{
    if(r.hit)return;
    const dx=ship2.x-r.x,dy=ship2.y-r.y;
    if(Math.sqrt(dx*dx+dy*dy)<r.r*0.8){r.hit=true;r.respawn=Date.now();score2+=500;fuel=Math.min(100,fuel+30)}
  });
}

  document.getElementById(\'heatFill\').style.background=heat>70?`linear-gradient(90deg,#ffd700,#ff0090)`:`linear-gradient(90deg,#00ff88,#ffd700)`;

  setTimeout(()=>{document.getElementById(\'overlay\').style.opacity=\'1\'},50);
}

let lastTime2=0;
function gameLoop2(now){
  if(!gameRunning)return;
  const dt=Math.min((now-lastTime2)/1000,0.05);
  lastTime2=now;

  updateShip2(dt);updateEnemies(dt);updateBullets(dt);updateAsteroids(dt);
  checkCollisions2();

  bgX.fillStyle=\'rgba(0,0,8,0.2)\';bgX.fillRect(0,0,W,H);
  drawBg(dt);
  cx.clearRect(0,0,W,H);
  drawAsteroids();drawRings(dt);drawBullets();drawEnemies();drawShip2(dt);drawExplosions(dt);
  drawMinimap();updateHUD2();

  requestAnimationFrame(gameLoop2);
}
